        <a

        <a

        >

        <div class="border-t border-gray-200 dark:border-slate-800 my-2 pt-2">
          <button

            class="w-full flex justify-between items-center px-4 py-2 rounded-xl hover:bg-gray-100 dark:hover:bg-slate-800 transition cursor-pointer focus:outline-none"

            <i

          </button>

          <div
            id="mobile-user-dropdown"
            class="hidden bg-white dark:bg-slate-950 rounded-xl mt-1 mx-2 border border-gray-100 dark:border-slate-800 overflow-hidden shadow-inner"
          >
            <a
              href="../login.html"
              class="flex items-center gap-2.5 px-6 py-2.5 text-sm text-red-600 font-medium hover:bg-red-50 dark:hover:bg-red-950/20"

    <main
      class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-6"
    >
      <div
        id="status-bar"
        class="w-full bg-white border border-emerald-400 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-sm transition-all duration-300 dark:bg-slate-900 dark:border-emerald-500/40"
      >
        <div class="flex items-center gap-4">
          <div
            id="status-badge"
            class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-2 transition-all dark:bg-emerald-950/30 dark:text-emerald-400 dark:border-emerald-800/50"
          >
            <span
              class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"
            ></span>
            <span id="badge-text">متصل</span>
          </div>
          <div
            id="status-details"
            class="text-gray-500 text-sm font-medium flex items-center gap-1 dark:text-zinc-400"
          >
            <span class="text-gray-700 dark:text-zinc-200">✓ متزامن</span>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button
            id="toggle-connection-btn"
            onclick="toggleConnection()"
            class="bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 font-medium text-sm px-3.5 py-2 rounded-xl flex items-center gap-2 shadow-sm transition-all active:scale-95 dark:bg-slate-800 dark:border-slate-700 dark:text-zinc-200 dark:hover:bg-slate-700"
          >
            <i
              id="toggle-icon"
              class="fa-solid fa-toggle-off text-orange-500 text-base"
            ></i>
            <span id="toggle-text">محاكاة عدم الاتصال</span>
          </button>

          <button
            onclick="triggerSync()"
            class="bg-teal-700 hover:bg-teal-800 text-white font-medium text-sm px-3.5 py-2 rounded-xl flex items-center gap-2 shadow-sm transition-all active:scale-95"
          >
            <i class="fa-solid fa-arrows-rotate text-xs"></i>
            <span>المزامنة الآن</span>
          </button>
        </div>
      </div>

      <div
        class="bg-white border border-gray-200/60 rounded-2xl p-2.5 shadow-sm dark:bg-slate-900 dark:border-slate-800"
      >
        <div
          class="flex flex-row items-center gap-2 overflow-x-auto custom-scrollbar"
        >
          <a
            href="control_panel.html"
            class="flex items-center gap-2.5 px-6 py-3 rounded-xl text-sm font-bold transition whitespace-nowrap  text-gray-600 hover:text-teal-700 dark:text-zinc-300 dark:hover:text-teal-400"
          >
            <i class="fa-solid fa-gauge-high text-base text-zinc-100"></i>
            <span>الرئيسية</span>
          </a>

          <a
            href="materials.html"
            class="flex items-center gap-2.5 px-6 py-3 rounded-xl text-sm font-semibold transition whitespace-nowrap   text-gray-600 hover:text-teal-700 dark:text-zinc-300 dark:hover:text-teal-400"
          >
            <i class="fa-solid fa-book-open text-base"></i>
            <span>المواد</span>
          </a>

          <a
            href="tests.html"
            class="flex items-center gap-2.5 px-6 py-3 rounded-xl text-sm font-semibold transition whitespace-nowrap  text-gray-600 hover:text-teal-700 dark:text-zinc-300 dark:hover:text-teal-400"
          >
            <i class="fa-solid fa-clipboard-question text-base"></i>
            <span>الإختبارات</span>
          </a>

          <a
            href="lessons.html"
            class="flex items-center gap-2.5 px-6 py-3 rounded-xl text-sm font-semibold transition whitespace-nowrap  text-gray-600 hover:text-teal-700 dark:text-zinc-300 dark:hover:text-teal-400"
          >
            <i class="fa-solid fa-chalkboard-user text-base"></i>
            <span>الدروس</span>
          </a>

          <a
            href="chats.html"
            class="flex items-center gap-2.5 px-6 py-3 rounded-xl text-sm font-semibold transition whitespace-nowrap  text-gray-600 hover:text-teal-700 dark:text-zinc-300 dark:hover:text-teal-400"
          >
            <i class="fa-solid fa-comments text-base"></i>
            <span>الدردشة</span>
          </a>

          <a
            href="sync.html"
            class="flex items-center gap-2.5 px-6 py-3 rounded-xl text-sm font-semibold transition whitespace-nowrap bg-teal-700 text-white shadow-md shadow-teal-700/10"

    </main>

    <div
      id="toast-container"
      class="fixed bottom-5 left-5 z-50 flex flex-col gap-3 pointer-events-none"
    ></div>

    <script>
      // 1. منطق تبديل الوضع الليلي والنهاري (Dark/Light Mode)
      const themeToggleBtns = document.querySelectorAll(".theme-toggle");
      const htmlElement = document.documentElement;

      function updateThemeUI(isDark) {
        themeToggleBtns.forEach((btn) => {
          const icon = btn.querySelector(".theme-icon");
          if (icon) {
            if (isDark) {
              icon.className =
                "theme-icon fa-solid fa-sun text-amber-400 text-lg";
            } else {
              icon.className = "theme-icon fa-regular fa-moon text-lg";
            }
          }
        });
      }

      const currentTheme = localStorage.getItem("theme");
      if (currentTheme === "dark") {
        htmlElement.classList.add("dark");
        updateThemeUI(true);
      } else {
        htmlElement.classList.remove("dark");
        updateThemeUI(false);
      }

      themeToggleBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const isDark = htmlElement.classList.toggle("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
          updateThemeUI(isDark);
        });
      });

      // 2. تفعيل القائمة الجانبية للموبايل
      const menuBtn = document.getElementById("mobile-menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");

      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
      });

      // 3. التحكم بقائمة المستخدم المنسدلة (Desktop Dropdown)
      const userMenuBtn = document.getElementById("user-menu-btn");
      const userDropdown = document.getElementById("user-dropdown");

      userMenuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        userDropdown.classList.toggle("hidden");
      });

      document.addEventListener("click", (e) => {
        if (
          !userDropdown.contains(e.target) &&
          !userMenuBtn.contains(e.target)
        ) {
          userDropdown.classList.add("hidden");
        }
      });

      // 4. التحكم بقائمة المستخدم للموبايل (Mobile User Dropdown)
      const mobileUserMenuBtn = document.getElementById("mobile-user-menu-btn");
      const mobileUserDropdown = document.getElementById(
        "mobile-user-dropdown",
      );
      const mobileArrow = document.getElementById("mobile-arrow");

      mobileUserMenuBtn.addEventListener("click", () => {
        mobileUserDropdown.classList.toggle("hidden");
        mobileArrow.classList.toggle("rotate-180");
      });

      // 5. محاكاة حالة الاتصال وبث الإشعارات التفاعلية (Sync & Toast System)
      let isConnected = true;

      function toggleConnection() {
        isConnected = !isConnected;

        const statusBar = document.getElementById("status-bar");
        const toggleIcon = document.getElementById("toggle-icon");
        const toggleText = document.getElementById("toggle-text");
        const statusDetails = document.getElementById("status-details");
        const statusBadge = document.getElementById("status-badge");
        const badgeText = document.getElementById("badge-text");

        if (!isConnected) {
          statusBar.className =
            "w-full bg-white border border-teal-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-sm transition-all duration-300 dark:bg-slate-900 dark:border-slate-800";
          toggleIcon.className = "fa-solid fa-chart-simple text-blue-500";
          toggleText.innerText = "العودة للاتصال";
          statusDetails.innerHTML = `⏳ يحفظ محلياً - في قائمة الانتظار: <span class="font-bold text-gray-800 dark:text-zinc-200 mr-1">0</span>`;
          statusBadge.className =
            "bg-red-50 text-red-700 border border-red-200 px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-2 transition-all dark:bg-red-950/30 dark:text-red-400 dark:border-red-900/50";
          statusBadge.querySelector("span").className =
            "w-2 h-2 rounded-full bg-red-500";
          badgeText.innerText = "غير متصل";

          showToast(
            "تم التبديل إلى وضع عدم الاتصال",
            "يتم حفظ البيانات محلياً",
            "border-amber-500",
          );
        } else {
          statusBar.className =
            "w-full bg-white border border-emerald-400 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-sm transition-all duration-300 dark:bg-slate-900 dark:border-emerald-500/40";
          toggleIcon.className = "fa-solid fa-toggle-off text-orange-500";
          toggleText.innerText = "محاكاة عدم الاتصال";
          statusDetails.innerHTML = `<span class="text-gray-700 dark:text-zinc-200">✓ متزامن</span>`;
          statusBadge.className =
            "bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-2 transition-all dark:bg-emerald-950/30 dark:text-emerald-400 dark:border-emerald-800/50";
          statusBadge.querySelector("span").className =
            "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
          badgeText.innerText = "متصل";

          showToast(
            "تم التبديل إلى وضع الاتصال",
            "جاري المزامنة...",
            "border-emerald-500",
          );
        }
      }

      function triggerSync() {
        showToast("تمت المزامنة", "لا توجد عناصر معلقة", "border-emerald-500");
      }

      function showToast(title, subtitle, borderColorClass) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `pointer-events-auto bg-white dark:bg-slate-900 rounded-2xl shadow-xl border-l-[6px] ${borderColorClass} p-4 w-72 transform translate-y-[120%] opacity-0 transition-all duration-500 ease-out flex flex-col gap-1 border-t border-r border-b border-gray-100 dark:border-slate-800`;

        toast.innerHTML = `
          <h4 class="text-slate-800 dark:text-zinc-100 font-bold text-base text-right">${title}</h4>
          <p class="text-slate-500 dark:text-zinc-400 text-xs text-right font-medium">${subtitle}</p>
        `;

        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove("translate-y-[120%]", "opacity-0");
        }, 50);

        setTimeout(() => {
          toast.classList.add("translate-y-[120%]", "opacity-0");
          setTimeout(() => {
            toast.remove();
          }, 500);
        }, 3500);
      }
    </script>
  </body>
